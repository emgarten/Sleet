name: Functional Tests (manual dispatch, with secrets)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to run functional tests for"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
          # Check out the PR's head commit (works for fork PRs too)
          ref: refs/pull/${{ inputs.pr_number }}/head

      - name: Show checked out ref
        shell: bash
        run: |
          echo "PR: #${{ inputs.pr_number }}"
          echo "SHA: $(git rev-parse HEAD)"
          git log -1 --oneline

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: ./build.sh
        shell: bash
        env:
          SLEET_TEST_ACCOUNT: ${{ secrets.SLEET_TEST_ACCOUNT }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: us-east-1
          CIBUILD: true

  build-win:
    runs-on: windows-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 0
          # Check out the PR's head commit (works for fork PRs too)
          ref: refs/pull/${{ inputs.pr_number }}/head

      - name: Show checked out ref
        shell: pwsh
        run: |
          Write-Host "PR: #${{ inputs.pr_number }}"
          Write-Host "SHA: $(git rev-parse HEAD)"
          git log -1 --oneline

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: ./build.ps1
        shell: pwsh
        env:
          SLEET_TEST_ACCOUNT: ${{ secrets.SLEET_TEST_ACCOUNT }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_DEFAULT_REGION: us-east-1
          CIBUILD: true
