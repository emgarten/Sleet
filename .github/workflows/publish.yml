# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: Publish to NuGet.org

on:
  release:
    types: [published]   # 🚀 auto-publish when a GitHub Release is published
  workflow_dispatch:      # ↩️ manual trigger fallback

jobs:
  build-win:

    runs-on: windows-latest
    environment: release
    permissions:
      id-token: write   # request the GitHub OIDC token for trusted publishing
      contents: read    # checkout still needs read access

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-tags: true
        fetch-depth: 0
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 10.0.x
    - name: Build
      run: ./build.ps1
      shell: pwsh
    - name: NuGet login (OIDC -> temp API key)
      uses: NuGet/login@v1
      id: login
      with:
        user: emgarten
    - name: Publish
      run: dotnet nuget push artifacts\nupkgs\*.nupkg  --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
      shell: pwsh
